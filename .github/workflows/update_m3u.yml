name: Tự Động Cập Nhật M3U (1 Giờ/Lần)

on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Thiết lập Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cài đặt thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests[socks]

    - name: Chạy Tool Cào Data (Debug Mode)
      env:
        PYTHONIOENCODING: utf-8
      run: python -u "m3u link.py" --startup

    - name: Lưu đè dữ liệu lên GitHub
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add cả 2 file cùng lúc để Git không báo lỗi Unstaged
        git add vn.m3u iptv_tool_config.json
        
        # Kiểm tra xem có thay đổi nào mới không (bao gồm cả file mới tạo)
        if [[ -n "$(git status --porcelain)" ]]; then
          git commit -m "Auto Update: Làm mới Token IPTV & Cập nhật Proxy Cache"
          git pull origin main --rebase -X ours
          git push origin main
        else
          echo "Không có thay đổi nào để commit."
        fi
