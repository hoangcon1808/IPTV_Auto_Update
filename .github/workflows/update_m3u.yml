name: Tự Động Cập Nhật M3U (1 Giờ/Lần)

on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Thiết lập Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cài đặt thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests PySocks

    - name: Chạy Tool Cào Data (Debug Mode)
      env:
        PYTHONIOENCODING: utf-8
      run: python -u "m3u link.py" --startup

    - name: Lưu đè file vn.m3u lên GitHub
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Sửa ở đây: Thêm iptv_tool_config.json để GitHub nhớ IP ngon cho lần sau
        git add vn.m3u iptv_tool_config.json
        
        # Nếu có thay đổi thì commit, nếu không thì bỏ qua
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto Update: Làm mới Token IPTV & Proxy"
        
        # Lấy data mới nhất từ nhánh chính, NẾU XUNG ĐỘT (CONFLICT) -> GIỮ LẠI FILE LOCAL (-X ours)
        git pull origin main --rebase -X ours
        
        git push origin main
