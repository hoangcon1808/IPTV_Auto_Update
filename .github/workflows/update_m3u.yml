name: Tự Động Cập Nhật M3U

on:
  # Lắng nghe tín hiệu kích hoạt từ Cron-job.org
  repository_dispatch:
    types: [update-m3u]
  # Cho phép kích hoạt bằng tay trên giao diện GitHub Actions
  workflow_dispatch:
  # (Tùy chọn) Vẫn giữ cron nội bộ của GitHub để dự phòng 1 giờ/lần
  schedule:
    - cron: '47 * * * *'

# BẮT BUỘC: Cấp quyền GHI cho GitHub Actions để có thể git push file mới lên repo
permissions:
  contents: write

# Nâng cao: Tự động hủy luồng cũ nếu có tín hiệu mới gửi đến, tránh lỗi xung đột Git Push
concurrency:
  group: update-m3u-group
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 2. Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Cài đặt thư viện cần thiết
        run: |
          python -m pip install --upgrade pip
          pip install selenium requests[socks]

      - name: 4. Chạy Tool Cào Data (Debug Mode)
        env:
          PYTHONIOENCODING: utf-8
        run: python -u "m3u link.py" --startup

      - name: 5. Lưu đè dữ liệu lên GitHub
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Đưa file vào danh sách chuẩn bị commit
          git add vn.m3u iptv_tool_config.json
          
          # Kiểm tra xem 2 file trên có thực sự thay đổi nội dung không
          if ! git diff --cached --quiet; then
            git commit -m "⚡ Auto Update: Làm mới Token IPTV & Cập nhật Proxy Cache - $(date '+%d/%m/%Y %H:%M:%S')"
            git pull origin main --rebase -X ours
            git push origin main
            echo "✅ Đã cập nhật và push file thành công!"
          else
            echo "ℹ️ Không có thay đổi nào để commit."
          fi

      # (Tùy chọn) Nếu muốn lưu ảnh chụp màn hình khi Selenium lỗi, bỏ dấu # ở 8 dòng dưới đây:
