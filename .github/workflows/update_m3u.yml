name: Tự Động Cập Nhật M3U (3 Giờ/Lần)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Thiết lập Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cài đặt thư viện cần thiết
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
        python -m pip install --upgrade pip
        pip install selenium

    - name: Chạy Tool Cào Data
      # Thêm cờ -u để ép Python hiển thị tiến trình (log) ra màn hình theo thời gian thực
      run: python -u "m3u link.py" --startup

    - name: Lưu đè file vn.m3u lên GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add vn.m3u
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto Update: Làm mới Token IPTV"
        git push
